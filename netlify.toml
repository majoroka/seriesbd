# Legado local: este ficheiro existe apenas para compatibilidade com `netlify dev`.
# Produção e preview oficiais correm em Cloudflare Pages/Functions.
[build]
  command = "vite build"
  functions = "netlify/functions"
  publish = "dist"

[dev]
  command = "vite" # Comando para iniciar o servidor de desenvolvimento
  targetPort = 5173 # Porta onde o Vite corre

[functions]
  node_bundler = "esbuild"
  directory = "netlify/functions" # Define explicitamente o diretório das funções

[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy = "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; form-action 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdnjs.cloudflare.com; img-src 'self' data: https:; connect-src 'self' https://*.supabase.co wss://*.supabase.co; frame-src https://www.youtube.com https://www.youtube-nocookie.com; font-src 'self' https://fonts.gstatic.com https://cdnjs.cloudflare.com; manifest-src 'self'; worker-src 'self' blob:"
    Referrer-Policy = "strict-origin-when-cross-origin"
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"

# Compatibilidade local: redireciona /api/* para os wrappers legados quando se usa `netlify dev`.
[[redirects]]
  from = "/api/tmdb/*"
  to = "/.netlify/functions/tmdb/:splat"
  status = 200

[[redirects]]
  from = "/api/trakt/*"
  to = "/.netlify/functions/trakt/:splat"
  status = 200

[[redirects]]
  from = "/api/tvmaze/*"
  to = "/.netlify/functions/tvmaze/:splat"
  status = 200

[[redirects]]
  from = "/api/books/*"
  to = "/.netlify/functions/books/:splat"
  status = 200

[[redirects]]
  from = "/api/auth/display-name-available"
  to = "/.netlify/functions/auth-display-name-available"
  status = 200
